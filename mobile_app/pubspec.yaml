name: coffee_app
description: Coffee shop mobile app

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  carousel_slider: ^5.0.0
  cached_network_image: ^3.3.1
  badges: ^3.1.2

  # State management & networking
  provider: ^6.1.1
  http: ^1.1.0

  # Local storage
  shared_preferences: ^2.2.2

  # Utilities
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/